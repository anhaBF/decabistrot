<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Deca Bistrot logo">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="97" fill="#FAF3E8"/>

  <!-- Outer border -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="#82582d" stroke-width="3.5"/>

  <!-- Inner decorative ring -->
  <circle cx="100" cy="100" r="87" fill="none" stroke="#82582d" stroke-width="0.8" stroke-opacity="0.35"/>

  <!-- Top ornament dots -->
  <circle cx="100" cy="20" r="2.8" fill="#82582d" fill-opacity="0.55"/>
  <circle cx="85"  cy="23" r="1.6" fill="#82582d" fill-opacity="0.3"/>
  <circle cx="115" cy="23" r="1.6" fill="#82582d" fill-opacity="0.3"/>

  <!-- DECA -->
  <text
    x="100" y="115"
    font-family="'Playfair Display', Georgia, serif"
    font-size="74"
    font-weight="700"
    fill="#82582d"
    text-anchor="middle"
    letter-spacing="-1">DECA</text>

  <!-- Divider line with diamond -->
  <line x1="38" y1="128" x2="85"  y2="128" stroke="#82582d" stroke-width="0.9" stroke-opacity="0.45"/>
  <polygon points="100,122 104,128 100,134 96,128" fill="#82582d" fill-opacity="0.7"/>
  <line x1="115" y1="128" x2="162" y2="128" stroke="#82582d" stroke-width="0.9" stroke-opacity="0.45"/>

  <!-- BISTROT -->
  <text
    x="100" y="158"
    font-family="'Karla', system-ui, sans-serif"
    font-size="15"
    font-weight="700"
    fill="#82582d"
    text-anchor="middle"
    letter-spacing="9">BISTROT</text>

  <!-- Bottom ornament -->
  <circle cx="100" cy="178" r="2.2" fill="#82582d" fill-opacity="0.45"/>
  <circle cx="89"  cy="175" r="1.3" fill="#82582d" fill-opacity="0.25"/>
  <circle cx="111" cy="175" r="1.3" fill="#82582d" fill-opacity="0.25"/>
</svg>
